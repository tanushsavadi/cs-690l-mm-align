runtime:
  raw_dir: data/raw
  processed_dir: data/processed
  artifacts_dir: artifacts/runs
  num_proc: 2
  seed: 7

datasets:
  training:
    source: huggingface
    path: trl-lib/rlaif-v
    split: train
  training_fallback:
    source: huggingface
    path: openbmb/RLAIF-V-Dataset
    split: train
    enabled: false
  vlfeedback:
    source: huggingface
    path: MMInstruction/VLFeedback
    split: train
    enabled: false
  hallusionbench:
    source: local-json
    path: data/raw/hallusionbench/HallusionBench.json
    image_root: data/raw/hallusionbench/hallusion_bench
    split: validation
  pope:
    source: local-dir
    path: data/raw/pope
    image_root: data/raw/coco/val2014
    split: validation
  chartqa:
    source: local-dir
    path: data/raw/chartqa
    split: val

model:
  base_model_name: Qwen/Qwen2.5-VL-3B-Instruct
  processor_name: null
  trust_remote_code: false
  attn_implementation: sdpa
  min_pixels: 200704
  max_pixels: 401408
  max_new_tokens: 96

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: all-linear
  bias: none

training:
  subset_name: smoke
  subset_size: 1000
  val_size: 1000
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  num_train_epochs: 1.0
  max_length: null
  gradient_checkpointing: true
  precision: bf16
  beta: 0.1
  lambda_gap: 0.2
  margin: 0.1
  lambda_anchor: 0.05
  precompute_ref_log_probs: false

evaluation:
  evaluate_variants:
    - base
    - standard_dpo
    - image_aware_dpo
  dependence_variants:
    - original
    - blank-image
    - mismatched-image
  blank_image_size: [448, 448]

dashboard:
  title: Multimodal Alignment Dashboard
  default_run: null
  page_size: 50
